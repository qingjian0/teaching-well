        function useTemplate(id) {
            const template = templates.find(t => t.id === id);

                template.downloadCount++;
                saveTemplates();

                window.location.href = 'courseware.html?template=' + id;
            }

        // 获取学科名称
        function getSubjectName(subject) {
            const subjects = {
                'chinese': '语文',
                'math': '数学'
            };
            return subjects[subject] || '其他';
        }
        
        // 获取年级名称
        function getGradeName(grade) {
            const grades = {
                '1': '一年级',
                '2': '二年级',
                '3': '三年级',
                '4': '四年级',
                '5': '五年级',
                '6': '六年级'
            };
            return grades[grade] || '未知年级';
        }
        
        // 获取课型名称
        function getLessonTypeName(lessonType) {
            const lessonTypes = {
                'new-lesson': '新授课',
                'review-lesson': '复习课',
                'practice-lesson': '练习课',
                'activity-lesson': '活动课',
                'integrated-lesson': '综合课'
            };
            return lessonTypes[lessonType] || '其他';
        }
        
        // 获取难度名称
        function getDifficultyName(difficulty) {
            const difficulties = {
                'easy': '简单',
                'medium': '中等',
                'difficult': '困难'
            };
            return difficulties[difficulty] || '未知';
        }
        
        // 过滤模板
        function filterTemplates() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const subjectFilter = document.getElementById('filter-subject').value;
            const versionFilter = document.getElementById('filter-version').value;
            const gradeFilter = document.getElementById('filter-grade').value;
            const lessonTypeFilter = document.getElementById('filter-lesson-type').value;
            const difficultyFilter = document.getElementById('filter-difficulty').value;
            const certifiedFilter = document.getElementById('filter-certified') ? document.getElementById('filter-certified').value : '';
            
            const filteredTemplates = templates.filter(template => {
                const matchesSearch = template.title.toLowerCase().includes(searchTerm) || 
                                     template.description.toLowerCase().includes(searchTerm);
                const matchesSubject = !subjectFilter || template.subject === subjectFilter;
                const matchesVersion = !versionFilter || template.version === versionFilter;
                const matchesGrade = !gradeFilter || template.grade === gradeFilter;
                const matchesLessonType = !lessonTypeFilter || template.lessonType === lessonTypeFilter;
                const matchesDifficulty = !difficultyFilter || template.difficulty === difficultyFilter;
                const isCertified = ReviewManager.isTemplateApproved(template.id);
                const matchesCertified = !certifiedFilter || (certifiedFilter === 'certified' && isCertified);
                
                return matchesSearch && matchesSubject && matchesVersion && matchesGrade && matchesLessonType && matchesDifficulty && matchesCertified;
            });
            
            generateTemplateCards(filteredTemplates);
        }
        
        // 获取版本名称
        function getVersionName(version) {
            const versions = {
                'pep': '人教版',
                'moe': '部编版',
                'bsd': '北师大版',
                'hs': '沪教版',
                'universal': '通用版'
            };
            return versions[version] || '通用版';
        }
        
        // 筛选器变化事件
        document.getElementById('search-input').addEventListener('input', filterTemplates);

        document.getElementById('filter-version').addEventListener('change', filterTemplates);
        document.getElementById('filter-grade').addEventListener('change', filterTemplates);
        document.getElementById('filter-lesson-type').addEventListener('change', filterTemplates);
        document.getElementById('filter-difficulty').addEventListener('change', filterTemplates);
        
        // 认证筛选器事件监听
        document.getElementById('filter-certified')?.addEventListener('change', filterTemplates);

            saveTemplates();
